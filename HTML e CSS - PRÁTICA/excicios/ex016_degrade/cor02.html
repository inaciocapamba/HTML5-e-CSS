<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com Degradê</title>
    <style>
        ** {
            height: 100%;
        }
        body{
            background-image: linear-gradient(to left, #5258CA 0.5%, #FFF8FF, #FD8B42, #ED4A5B, #FBC852);
            text-align: center;
            padding-top: 200px;
        }
    </style>
</head>
<body>
    <h1>Degradê em CSS</h1>
    <h2>Última actualização:</h2>
    <input type="button" value="Verificar" onclick="data()">
    <p id="tempo"></p>
    <script>
        function data(){
            const data = new Date()
            var hora = data.getHours()
            const min = data.getMinutes()
            const seg = data.getSeconds()
            var res = document.querySelector('p#tempo')
            res.innerHTML = `Tempo Actual <br>${hora}:${min}:${seg}`
        }
    </script>
</body>
</html>
