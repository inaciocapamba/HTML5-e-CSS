<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos e Quebra Linha</title>
</head>
<body>
    <h1>Parágrafos e Quebra Linha</h1>
    <hr>
    <p>Tudo isso é um parágrafo e não vai mudar de linha até que você saia dessas tags p e /p </p>
    <p>Se precisar quebrar linha use &lt;br&gt;
    </p>
    <p>
        Simbolos:
        &reg;
        &copy;
        &euro;
        &yen;
        &cent;
    </p>
    <p>Emojis:
        &#x1F60E
        &#x1F440
    </p>
</body>
</html>
