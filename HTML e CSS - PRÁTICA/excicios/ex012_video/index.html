<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos em HTML</title>
</head>
<body>
    <h1>Vídeos hospedados no meu servidor</h1>
    <p>Este vídeo está no meu próprio servidor</p>
    <video  width="400" poster="imagens/limoes-capa.png" controls>
        <source src="midia/meu-video.mp4" type="video/mp4">
        <source src="midia/meu-video.m4v" type="video/mp4">
        <source src="midia/meu-video.webm" type="video/webm">
        <source src="midia/meu-video.ogv" type="video/ogv">
        <p>Infelizmente o seu reprodutor não conseguiu reproduzir o vídeo. Tente descarregar clicando <a href="midia/meu-video.mp4" download="meu-video">aqui</a>.</p>
    </video>

    <h1>Inserindo videos do YouTube / Hospedagen Externa</h1>

    <iframe width="400" height="315" src="https://www.youtube.com/embed/5osZk9Mw94w?si=8RuO7MXSzWDq41k7" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</body>
</html>
