<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicionamento</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        body{
            background-image: url(imagens/wallpaper002.jpg);
            background-size: 100%;
            background-repeat: no-repeat;
            background-size: 100hv;
        }
        header{
            margin: 10px;
            color: white;
            border: 2px solid;
            border-radius: 4px 4px 0px 0px;
            font-weight: bold;
            padding-bottom: 10px;
        }
        header > h1{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            padding-top: 10px;
        }
        header > p{
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            padding-top: 5px;
            padding-bottom: 10px;
            text-align: center;
        }
        header > span > a{
            padding: 10px;
            text-decoration: none;
            color: white;
        }
        header > span > a:hover{
            color: blue;
            background-color: white;
            border-radius: 4px;
        }
        main{
            border: 2px solid white;
            margin: 10px;
            height: 1000px;
        }
        footer{
            margin: 10px;
            border: 2px solid white;
            height: 50px;
            padding: 5px;
        }
        footer > p{
            color: white;
            text-align: center;
        }


    </style>
</head>
<body>
    <header>
        <h1>Huambo Express</h1>
        <p>Voe e chegue ao seu destino em segurança</p>
        <span>
            <a href="#">Home</a>
            <a href="#">Passagens</a>
            <a href="#">Notícias</a>
        </span>
    </header>
    <main>

    </main>
    <footer>
        <section>
            <textarea name="sugestoes" id="sugest">Escreva aqui</textarea>
        </section>
        <p>&copy Feito Por Inácio</p>
    </footer>
</body>
</html>
